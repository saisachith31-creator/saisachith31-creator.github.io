<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News & Events - Hysent International</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="news.css">

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo">Hysent International</div>

    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">Company</a>
        <a href="products.html">Products</a>
        <a href="services.html">Services</a>
        <a href="news.html">News</a>
        <a href="careers.html">Careers</a>
        <a href="contact.html">Contact</a>
    </div>
</nav>

<!-- PAGE -->
<section class="news-page">

    <h1>News & Events</h1>
    <p>Stay updated with our latest activities and announcements</p>

    <!-- CALENDAR -->
    <div class="calendar">
        <h3>April 2026</h3>
        <div class="calendar-grid" id="calendar"></div>
    </div>

    <!-- EVENTS DISPLAY -->
    <div id="event-list" class="events">
        <p>No events for this date.</p>
    </div>

</section>

<footer>
    <p>© 2026 Hysent International</p>
</footer>

<script>
// ============================
// EVENTS DATABASE
// ============================
const events = {
    "2026-04-06": [
        {
            title: "Offshore Safety Seminar",
            desc: "Live training on offshore safety systems.",
        }
    ],
    "2026-04-10": [
        {
            title: "Marine Engineering Expo",
            desc: "Showcasing latest marine innovations.",
        }
    ],
    "2026-04-15": [
        {
            title: "Client Project Launch",
            desc: "Deployment of ventilation systems.",
        }
    ]
};

// ============================
// GENERATE CALENDAR
// ============================
const calendar = document.getElementById("calendar");

// April 2026 → 30 days
const totalDays = 30;

// Today
const today = new Date();
const todayStr = today.toISOString().split("T")[0];

// Create days
for (let i = 1; i <= totalDays; i++) {
    const day = document.createElement("div");
    day.classList.add("day");
    day.textContent = i;

    const dateStr = `2026-04-${String(i).padStart(2, "0")}`;

    // highlight today
    if (dateStr === todayStr) {
        day.classList.add("today");
    }

    // click event
    day.addEventListener("click", () => {
        document.querySelectorAll(".day").forEach(d => d.classList.remove("active"));
        day.classList.add("active");

        showEvents(dateStr);
    });

    calendar.appendChild(day);
}

// ============================
// SHOW EVENTS
// ============================
const eventList = document.getElementById("event-list");

function showEvents(date) {
    eventList.innerHTML = "";

    if (!events[date]) {
        eventList.innerHTML = "<p>No events for this date.</p>";
        return;
    }

    events[date].forEach(event => {

        let status = "";
        let statusClass = "";

        if (date === todayStr) {
            status = "🔴 LIVE";
            statusClass = "live";
        } else if (date < todayStr) {
            status = "⚪ ENDED";
            statusClass = "completed";
        } else {
            status = "🔵 UPCOMING";
        }

        const card = `
            <div class="event-card">
                <h3>${event.title}</h3>
                <p>${event.desc}</p>
                <div class="status ${statusClass}">${status}</div>
            </div>
        `;

        eventList.innerHTML += card;
    });
}

// ============================
// AUTO LOAD TODAY EVENTS
// ============================
showEvents(todayStr);

</script>

</body>
</html>
