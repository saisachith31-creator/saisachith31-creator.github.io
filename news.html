<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News & Events - Hysent International</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="news.css">
<style>

/* PAGE */
.news-page {
    padding: 60px 10%;
}

/* CALENDAR */
.calendar {
    background: white;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 40px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.05);
}

.calendar h3 {
    margin-bottom: 15px;
}

.calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 10px;
}

.day {
    padding: 10px;
    text-align: center;
    border-radius: 6px;
    cursor: pointer;
    background: #f1f5f9;
    transition: 0.2s;
}

.day:hover {
    background: #2563eb;
    color: white;
}

/* TODAY */
.today {
    background: #2563eb;
    color: white;
}

/* EVENT DAY */
.event-day {
    border: 2px solid #7c3aed;
}

/* EVENTS */
.events {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.event-card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.05);
}

/* STATUS */
.status {
    margin-top: 10px;
    font-size: 14px;
    font-weight: bold;
}

/* LIVE */
.live {
    color: red;
}

/* COMPLETED */
.completed {
    color: gray;
}

</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo">Hysent International</div>

    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">Company</a>
        <a href="products.html">Products</a>
        <a href="services.html">Services</a>
        <a href="news.html">News</a>
        <a href="careers.html">Careers</a>
        <a href="contact.html">Contact</a>
    </div>
</nav>

<!-- PAGE -->
<section class="news-page">

    <h1>News & Events</h1>
    <p>Stay updated with our latest activities and announcements</p>

    <!-- CALENDAR -->
    <div class="calendar">
        <h3>April 2026</h3>
        <div class="calendar-grid" id="calendar"></div>
    </div>

    <!-- EVENTS -->
    <div class="events" id="events"></div>

</section>

<footer>
    <p>© 2026 Hysent International</p>
</footer>

<script>

// EVENTS DATA (you can add more later)
const eventsData = [
    {
        date: "2026-04-06",
        title: "Offshore Safety Conference",
        description: "Live discussion on offshore safety standards.",
        live: true
    },
    {
        date: "2026-04-04",
        title: "Marine Equipment Expo",
        description: "Showcasing latest marine engineering solutions.",
        live: false
    }
];

// CREATE CALENDAR
const calendar = document.getElementById("calendar");
const eventsContainer = document.getElementById("events");

const today = new Date().toISOString().split("T")[0];

// create days (1–30 for demo)
for (let i = 1; i <= 30; i++) {
    let day = document.createElement("div");
    day.classList.add("day");

    let dateStr = `2026-04-${String(i).padStart(2, "0")}`;
    day.innerText = i;

    // highlight today
    if (dateStr === today) {
        day.classList.add("today");
    }

    // highlight event days
    if (eventsData.some(e => e.date === dateStr)) {
        day.classList.add("event-day");
    }

    day.onclick = () => showEvents(dateStr);

    calendar.appendChild(day);
}

// SHOW EVENTS
function showEvents(date) {
    eventsContainer.innerHTML = "";

    const filtered = eventsData.filter(e => e.date === date);

    if (filtered.length === 0) {
        eventsContainer.innerHTML = "<p>No events for this date.</p>";
        return;
    }

    filtered.forEach(e => {
        const card = document.createElement("div");
        card.classList.add("event-card");

        card.innerHTML = `
            <h3>${e.title}</h3>
            <p>${e.description}</p>
            <div class="status ${e.live ? "live" : "completed"}">
                ${e.live ? "🔴 LIVE NOW" : "⚫ Completed on " + e.date}
            </div>
        `;

        eventsContainer.appendChild(card);
    });
}

// AUTO LOAD TODAY EVENTS
showEvents(today);

</script>

</body>
</html>
